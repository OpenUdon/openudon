name: deterministic

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: deterministic checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GOPRIVATE: github.com/genelet/*,github.com/tabilet/*
      GONOSUMDB: github.com/genelet/*,github.com/tabilet/*
      GONOPROXY: github.com/genelet/*,github.com/tabilet/*

    steps:
      - name: Require private dependency token
        env:
          RAMEN_CI_GENELET_TOKEN: ${{ secrets.RAMEN_CI_GENELET_TOKEN }}
          RAMEN_CI_TABILET_TOKEN: ${{ secrets.RAMEN_CI_TABILET_TOKEN }}
        run: |
          if [ -z "${RAMEN_CI_GENELET_TOKEN}" ]; then
            echo "::error::Set RAMEN_CI_GENELET_TOKEN with read access to private genelet dependency repos."
            exit 1
          fi
          if [ -z "${RAMEN_CI_TABILET_TOKEN}" ]; then
            echo "::error::Set RAMEN_CI_TABILET_TOKEN with read access to private tabilet dependency repos."
            exit 1
          fi

      - name: Preflight private repository access
        env:
          RAMEN_CI_GENELET_TOKEN: ${{ secrets.RAMEN_CI_GENELET_TOKEN }}
          RAMEN_CI_TABILET_TOKEN: ${{ secrets.RAMEN_CI_TABILET_TOKEN }}
        run: |
          failed=0

          check_repo_access() {
            token="$1"
            secret_name="$2"
            repo="$3"
            response_file="$(mktemp)"
            status="$(
              curl --silent --show-error --output "${response_file}" --write-out "%{http_code}" \
                --header "Accept: application/vnd.github+json" \
                --header "Authorization: Bearer ${token}" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${repo}"
            )"

            case "${status}" in
              200)
                echo "Verified ${repo}"
                ;;
              401)
                echo "::error title=Bad ${secret_name}::${secret_name} was rejected by GitHub while checking ${repo}. Regenerate the token or update the repository secret value."
                failed=1
                ;;
              403)
                echo "::error title=Insufficient ${secret_name}::${secret_name} could not access ${repo}. Grant read-only contents access and approve the token for the organization if required."
                failed=1
                ;;
              404)
                echo "::error title=Missing private repo access::${secret_name} cannot see ${repo}. Add this repository to the token's repository access list or verify the repository name."
                failed=1
                ;;
              *)
                message="$(tr -d '\n' < "${response_file}" | cut -c 1-180)"
                echo "::error title=Private repo preflight failed::GitHub returned HTTP ${status} while checking ${repo} with ${secret_name}: ${message}"
                failed=1
                ;;
            esac

            rm -f "${response_file}"
          }

          for repo in \
            genelet/udon \
            genelet/grand \
            genelet/golet \
            genelet/hcllight \
            genelet/horizon \
            genelet/molecule \
            genelet/determined
          do
            check_repo_access "${RAMEN_CI_GENELET_TOKEN}" RAMEN_CI_GENELET_TOKEN "${repo}"
          done

          for repo in \
            tabilet/uws \
            tabilet/arazzo \
            tabilet/oas \
            tabilet/schema \
            tabilet/sqlmeta
          do
            check_repo_access "${RAMEN_CI_TABILET_TOKEN}" RAMEN_CI_TABILET_TOKEN "${repo}"
          done

          exit "${failed}"

      - name: Check out ramen
        uses: actions/checkout@v6
        with:
          path: ramen

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ramen/go.mod
          cache-dependency-path: ramen/go.sum

      - name: Check out udon
        uses: actions/checkout@v6
        with:
          repository: genelet/udon
          token: ${{ secrets.RAMEN_CI_GENELET_TOKEN }}
          path: udon

      - name: Check out grand
        uses: actions/checkout@v6
        with:
          repository: genelet/grand
          token: ${{ secrets.RAMEN_CI_GENELET_TOKEN }}
          path: grand

      - name: Check out golet
        uses: actions/checkout@v6
        with:
          repository: genelet/golet
          token: ${{ secrets.RAMEN_CI_GENELET_TOKEN }}
          path: golet

      - name: Check out hcllight
        uses: actions/checkout@v6
        with:
          repository: genelet/hcllight
          token: ${{ secrets.RAMEN_CI_GENELET_TOKEN }}
          path: hcllight

      - name: Check out horizon
        uses: actions/checkout@v6
        with:
          repository: genelet/horizon
          token: ${{ secrets.RAMEN_CI_GENELET_TOKEN }}
          path: horizon

      - name: Check out molecule
        uses: actions/checkout@v6
        with:
          repository: genelet/molecule
          token: ${{ secrets.RAMEN_CI_GENELET_TOKEN }}
          path: molecule

      - name: Check out uws
        uses: actions/checkout@v6
        with:
          repository: tabilet/uws
          token: ${{ secrets.RAMEN_CI_TABILET_TOKEN }}
          path: uws

      - name: Check out arazzo
        uses: actions/checkout@v6
        with:
          repository: tabilet/arazzo
          token: ${{ secrets.RAMEN_CI_TABILET_TOKEN }}
          path: arazzo

      - name: Configure private module access
        env:
          RAMEN_CI_GENELET_TOKEN: ${{ secrets.RAMEN_CI_GENELET_TOKEN }}
          RAMEN_CI_TABILET_TOKEN: ${{ secrets.RAMEN_CI_TABILET_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${RAMEN_CI_TABILET_TOKEN}@github.com/tabilet/oas".insteadOf "https://github.com/genelet/oas"
          git config --global url."https://x-access-token:${RAMEN_CI_TABILET_TOKEN}@github.com/tabilet/schema".insteadOf "https://github.com/genelet/schema"
          git config --global url."https://x-access-token:${RAMEN_CI_TABILET_TOKEN}@github.com/tabilet/sqlmeta".insteadOf "https://github.com/genelet/sqlmeta"
          git config --global url."https://x-access-token:${RAMEN_CI_GENELET_TOKEN}@github.com/genelet/".insteadOf "https://github.com/genelet/"
          git config --global url."https://x-access-token:${RAMEN_CI_TABILET_TOKEN}@github.com/tabilet/".insteadOf "https://github.com/tabilet/"
          go env -w GOPRIVATE="${GOPRIVATE}"
          go env -w GONOSUMDB="${GONOSUMDB}"
          go env -w GONOPROXY="${GONOPROXY}"

      - name: Check sibling layout
        working-directory: ramen
        run: ./scripts/check-siblings.sh

      - name: Test
        working-directory: ramen
        run: go test ./...

      - name: Vet
        working-directory: ramen
        run: go vet ./...

      - name: Check
        working-directory: ramen
        run: make check

      - name: Whitespace
        working-directory: ramen
        run: git diff --check
