name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet public module
        run: GOWORK=off go vet ./...

      - name: Test public module
        run: GOWORK=off go test ./... -count=1 -timeout=5m

      - name: Check repository boundary
        run: GOWORK=off go run ./cmd/openudon check-apitools-boundary

      - name: Check whitespace
        run: git diff --check
