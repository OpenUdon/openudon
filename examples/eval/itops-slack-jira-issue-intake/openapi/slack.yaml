openapi: 3.0.0
info:
  title: Slack Issue Intake API
  version: 1.0.0
servers:
  - url: https://slack.example.test/api
paths:
  /conversations.history:
    get:
      operationId: getSlackMessage
      summary: Fetch a Slack message by channel and timestamp.
      parameters:
        - name: channel
          in: query
          required: true
          schema:
            type: string
        - name: ts
          in: query
          required: true
          schema:
            type: string
      security:
        - slackBearer: []
      responses:
        "200":
          description: message response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: object
                    properties:
                      text:
                        type: string
                      user:
                        type: string
                      ts:
                        type: string
  /chat.postMessage:
    post:
      operationId: postMessage
      summary: Post a Slack message.
      security:
        - slackBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - channel
                - text
              properties:
                channel:
                  type: string
                text:
                  type: string
      responses:
        "200":
          description: post response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  ts:
                    type: string
components:
  securitySchemes:
    slackBearer:
      type: http
      scheme: bearer
