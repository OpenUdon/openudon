openapi: 3.0.0
info:
  title: Ticket API
  version: 1.0.0
servers:
  - url: https://tickets.example.test
paths:
  /tickets/{ticketId}:
    get:
      operationId: getTicket
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ticket
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  subject:
                    type: string
                  summary:
                    type: string
                  assignee:
                    type: object
                    properties:
                      email:
                        type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
