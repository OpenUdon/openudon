openapi: 3.0.0
info:
  title: Support API
  version: 1.0.0
servers:
  - url: https://support.example.test
paths:
  /tickets/{ticketId}:
    get:
      operationId: getTicket
      summary: Fetch support ticket details.
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  requesterEmail:
                    type: string
                  subject:
                    type: string
                  summary:
                    type: string
                  severity:
                    type: string
