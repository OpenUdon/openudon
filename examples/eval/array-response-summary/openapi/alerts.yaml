openapi: 3.0.0
info:
  title: Alerts API
  version: 1.0.0
servers:
  - url: https://alerts.example.test
paths:
  /alerts:
    get:
      operationId: listAlerts
      parameters:
        - name: severity
          in: query
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        "200":
          description: alerts
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        service:
                          type: string
                        severity:
                          type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
