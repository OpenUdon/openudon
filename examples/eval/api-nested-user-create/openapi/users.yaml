openapi: 3.0.0
info:
  title: User Admin API
  version: 1.0.0
servers:
  - url: https://users.example.test
paths:
  /users:
    post:
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, displayName, profile]
              properties:
                email:
                  type: string
                displayName:
                  type: string
                profile:
                  type: object
                  properties:
                    department:
                      type: string
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
