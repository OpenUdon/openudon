openapi: 3.0.0
info:
  title: Google Drive Incident Archive API
  version: 1.0.0
servers:
  - url: https://drive.example.test
paths:
  /upload/drive/v3/files:
    post:
      operationId: uploadFile
      summary: Upload an incident report file.
      security:
        - driveBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - parentId
                - content
              properties:
                name:
                  type: string
                parentId:
                  type: string
                content:
                  type: string
      responses:
        "200":
          description: uploaded file
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
components:
  securitySchemes:
    driveBearer:
      type: http
      scheme: bearer
