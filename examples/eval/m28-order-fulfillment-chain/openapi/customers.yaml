openapi: 3.0.0
info:
  title: Customer API
  version: 1.0.0
servers:
  - url: https://customers.example.test
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
paths:
  /customers/{customerId}:
    get:
      operationId: getCustomer
      summary: Fetch customer profile and default shipping details.
      security:
        - BearerAuth: []
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                  defaultShippingAddress:
                    type: object
                    properties:
                      id:
                        type: string
                      country:
                        type: string
