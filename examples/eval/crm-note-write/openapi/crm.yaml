openapi: 3.0.0
info:
  title: CRM API
  version: 1.0.0
servers:
  - url: https://crm.example.test
paths:
  /contacts/{contactId}/notes:
    post:
      operationId: createContactNote
      summary: Create an internal note for a contact.
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
                - visibility
              properties:
                text:
                  type: string
                visibility:
                  type: string
                  enum:
                    - internal
                    - public
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  contactId:
                    type: string
                  status:
                    type: string
