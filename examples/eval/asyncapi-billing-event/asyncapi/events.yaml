asyncapi: 3.0.0
info:
  title: Billing Events
  version: 1.0.0
  description: Provider-free billing event contract for OpenUdon AsyncAPI packaging coverage.
operations:
  publishInvoiceCreated:
    action: send
    summary: Publish an invoice-created event.
    description: Sends an invoice-created message to the billing event channel.
    channel:
      $ref: '#/channels/invoices'
    messages:
      - $ref: '#/channels/invoices/messages/invoiceCreated'
channels:
  invoices:
    address: billing.invoices
    messages:
      invoiceCreated:
        headers:
          type: object
          properties:
            trace_id:
              type: string
        payload:
          type: object
          required:
            - invoice_id
            - customer_id
          properties:
            invoice_id:
              type: string
            customer_id:
              type: string
