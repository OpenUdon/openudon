openapi: 3.0.0
info:
  title: Feature Flag API
  version: 1.0.0
servers:
  - url: https://flags.example.test
paths:
  /flags/{flagKey}:
    get:
      operationId: getFeatureFlag
      parameters:
        - name: flagKey
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        "200":
          description: flag
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                  enabled:
                    type: boolean
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
